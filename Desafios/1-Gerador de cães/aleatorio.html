<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Cães</title>

  <!-- Bootstrap só pra deixar bonito -->
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-success d-flex flex-column align-items-center justify-content-center vh-100">

  <h1 class="mb-4">🐶 Gerador de Cães</h1>

  <!-- Imagem -->
  <img 
    id="dogImg" 
    src="https://dog.ceo/api/breeds/image/random" 
    class="mb-3 rounded shadow"
    width="300"
    height="300"
  >

  <!-- Botão -->
  <button id="btnDog" class="btn btn-primary">
    Gerar Cão
  </button>

  <script>
    const btn = document.getElementById("btnDog");
    const img = document.getElementById("dogImg");

    btn.addEventListener("click", () => {

      fetch("https://dog.ceo/api/breeds/image/random")
        .then(response => response.json())
        .then(data => {
          img.src = data.message;
        })
        .catch(error => {
          console.log("Erro:", error);
        });

    });
  </script>

</body>
</html>
