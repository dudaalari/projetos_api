<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feriados Nacionais - Purple Style</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    /* Customização de Cores */
    body {
      background: #f3e5f5; /* Cor de fundo */
    }

    .card {
      border: none;
      border-radius: 15px;
      border-top: 5px solid #6a1b9a; /* Barra roxa no topo */
    }

    .card-title {
      color: #4a148c;
      font-weight: bold;
    }

    .table thead {
      background-color: #6a1b9a;
      color: white;
    }

    /* Efeito interativo ao passar o mouse na tabela */
    .table-hover tbody tr:hover {
      background-color: #f3e5f5 !important;
      transition: 0.3s;
    }

    /* Estilo para a coluna de data */
    /* o badge ele adiciona uma cor de fundo e destaca*/
    .badge-date {
      background-color: #8e24aa;
      color: white;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.9em;
    }
  </style>
</head>

     <!-- Comando que coloca a tabela ao meio da página  -->
<body class="d-flex justify-content-center align-items-center vh-100"> 

  <div class="card shadow-lg" style="width: 35rem;">
    
    <div class="card-body">
      <h5 class="card-title text-center mb-4">📅 Feriados Nacionais 2024</h5>

      <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
        <table class="table table-hover">
          <thead>
            <tr>
              <th class="rounded-start">Data</th>
              <th class="rounded-end">Feriado</th>
            </tr>
          </thead>

          <tbody id="tabelaFeriados">
            </tbody>
        </table>
      </div>

    </div>

  </div>

  <script>
    const tabela = document.getElementById("tabelaFeriados");

    // Garante que o código vai carregar quando a página estiver totalmente carregada Window.addEventListener...//
    window.addEventListener("load", () => {
      fetch("https://brasilapi.com.br/api/feriados/v1/2024")
        .then(response => response.json())
        .then(dados => {
          tabela.innerHTML = ""; // Limpa a tabela antes de preencher

          dados.forEach(feriado => {
            const linha = document.createElement("tr");

            // Formata a data de AAAA-MM-DD para DD/MM/AAAA
            const dataFormatada = feriado.date.split('-').reverse().join('/');

            linha.innerHTML = `
              <td><span class="badge-date">${dataFormatada}</span></td>
              <td class="align-middle" style="color: #4a148c; font-weight: 500;">${feriado.name}</td>
            `;

            tabela.appendChild(linha);
          });
        })
        // Mensagem de erro caso a internet cair ou o API falhar//
        .catch(error => {
          console.log("Erro:", error);
          tabela.innerHTML = "<tr><td colspan='2' class='text-center text-danger'>Erro ao carregar dados.</td></tr>";
        });
    });
  </script>

</body>
</html>
